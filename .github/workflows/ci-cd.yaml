name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zhima-001/angelpay

jobs:
  # Stage 1: PHP Lint / Syntax Check
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: PHP Syntax Check
        run: |
          echo "=== PHP Syntax Check ==="
          find . -name "*.php" -not -path "./vendor/*" -not -path "./plugins/chajian/*" | head -50 | xargs -I {} php -l {} || true
          # Check critical files
          php -l index.php
          php -l health.php
          php -l ready.php
          php -l db.php
          php -l docker/config.php
          echo "=== Syntax check passed ==="

  # Stage 2-4: Build, Scan, Push
  build-scan-push:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.short }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # Stage 5: Update env repo
  update-env:
    needs: build-scan-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout env repo
        uses: actions/checkout@v4
        with:
          repository: zhima-001/angelpay-env
          token: ${{ secrets.ENV_REPO_TOKEN }}
          path: angelpay-env

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update image tag in env repo
        run: |
          cd angelpay-env
          # Update prod overlay kustomization.yaml
          sed -i "s/newTag: .*/newTag: \"${{ steps.sha.outputs.short }}\"/" overlays/prod/kustomization.yaml
          echo "Updated image tag to: ${{ steps.sha.outputs.short }}"
          cat overlays/prod/kustomization.yaml

      - name: Commit and push
        run: |
          cd angelpay-env
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update angelpay image to ${{ steps.sha.outputs.short }}"
          git push
